openapi: 3.0.3
info:
  title: Dit Mock Order
  description: |-
    Documentation Dit Mock Order
  version: 1.0.0

servers:
  - description: Mock Order
    url: http://localhost:8080/api/v1

paths:
  /order:
    get:
      summary: Get order information
      description: Returns order response with status and possible error details
      operationId: getOrder
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /orders:
    get:
      summary: Get latest orders
      description: Returns a list of latest orders limited by the provided number
      operationId: getLatestOrders
      parameters:
        - name: limit
          in: query
          required: true
          description: Number of latest orders to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
            example: 10
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderListResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:

    OrderResponse:
      type: object
      description: Main response object containing order data and execution status
      properties:
        rqId:
          type: string
          format: uuid
          description: Unique request identifier
          example: "123e4567-e89b-12d3-a456-426614174000"
        timestamp:
          type: string
          format: date-time
          description: Response timestamp
          example: "2026-04-29T12:00:00Z"
        status:
          type: string
          description: Execution status
          enum: [SUCCESS, ERROR]
          default: SUCCESS
        error:
          $ref: '#/components/schemas/ErrorResponse'
        order:
          $ref: '#/components/schemas/Order'

    ErrorResponse:
      type: object
      description: Error details
      properties:
        code:
          type: integer
          description: Error code
          example: 400
        message:
          type: string
          description: Error message
          example: "Invalid request parameters"

    Order:
      type: object
      description: Order entity
      properties:
        id:
          type: string
          format: uuid
          description: Order ID
          example: "223e4567-e89b-12d3-a456-426614174111"
        created:
          type: string
          format: date-time
          description: Creation timestamp
          example: "2026-05-01T12:30:00"
        productId:
          type: string
          format: uuid
          description: Product ID
          example: "323e4567-e89b-12d3-a456-426614174222"
        quantity:
          type: integer
          description: Quantity of products
          default: 1
          example: 2
        shipped:
          type: string
          format: date
          description: Shipping date
          example: "2026-05-01"
        status:
          type: string
          description: Order status
          enum: [NEW, SHIPPED, COMPLETED]
          default: NEW

    OrderListResponse:
      type: object
      description: Response containing list of orders
      properties:
        rqId:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
        status:
          type: string
          enum: [ SUCCESS, ERROR ]
        error:
          $ref: '#/components/schemas/ErrorResponse'
        orders:
          type: array
          items:
            $ref: '#/components/schemas/Order'